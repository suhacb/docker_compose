server {
    listen 80;

    location / {
        proxy_pass http://openclaw:18789;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Preserve original Host and Origin so openclaw validates them correctly
        proxy_set_header Host $host;
        proxy_set_header Origin $http_origin;

        # Clear all forwarding headers — openclaw must see the nginx container
        # IP (a private 172.x address) as remoteAddress, not the browser's
        # public IP. This triggers the silent local-pairing auto-approval.
        proxy_set_header X-Forwarded-For "";
        proxy_set_header X-Forwarded-Host "";
        proxy_set_header X-Forwarded-Proto "";
        proxy_set_header X-Real-IP "";

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
